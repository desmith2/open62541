# https://aka.ms/yaml

jobs:
- job: 'CK3E'
  displayName: 'Arch (armhf-ubuntu)'
  pool:
    vmImage: 'linaro/base-armhf-ubuntu'
  steps:
  - checkout: self
    submodules: recursive

  - task: Bash@3
    inputs:
      targetType: FilePath
      filePath: ./tools/azure-devops/ck3e/install.sh
      failOnStderr: false
    displayName: Installing required packages

  - task: Bash@3
    inputs:
      targetType: FilePath
      filePath: ./tools/azure-devops/ck3e/build.sh
      failOnStderr: false
    displayName: Building & Testing

